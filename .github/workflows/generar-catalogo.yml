name: Generar catálogo

# Se dispara manualmente desde la pestaña "Actions" de GitHub (botón "Run workflow")
on:
  workflow_dispatch:
    inputs:
      shop_base:
        description: 'URL principal de tu tienda (ej: https://freakysocks.com.co)'
        required: true
        default: 'https://freakysocks.com.co'
      categorias:
        description: 'Slugs de categorías separados por coma (ej: medias-media-cana,compresion,bajitas,regalos)'
        required: true

jobs:
  capturar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Playwright y el navegador
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Correr el script de capturas
        env:
          SHOP_BASE: ${{ github.event.inputs.shop_base }}
          CATEGORIAS: ${{ github.event.inputs.categorias }}
          CLOUDFLARE_BYPASS_SECRET: ${{ secrets.CLOUDFLARE_BYPASS_SECRET }}
        run: node scripts/generar-catalogo.js

      - name: Publicar las imágenes en GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./capturas
          publish_branch: gh-pages
